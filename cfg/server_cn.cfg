// 为同时适用于"原版"和竞技服务器而设计
// 几乎不需要什么知识，一切都有说明。

// [常规]
// -----------------------------------------------------------------------
hostname "My Cool Server"       // 不会变动的主机名。

rcon_password "WowYouKnowThePasswordHere"            // Rcon 密码，主要用于远程访问。
sv_steamgroup "13333337"
sv_search_key "CompetitiveRework"
sv_steamgroup_exclusive "1"              // 如果设为 1，服务器空置时只有 Steam 组成员可以加入，普通玩家仅在有其他玩家时才能加入。
                                         // （非组成员在 lobby 中强制输入 IP，或通过直连始终有效）

motdfile "mymotd.txt"                    // 防止 Valve 每次更新时覆盖 MoTD。[请编辑此文件而非 motd.txt，位于同一目录 (/left4dead2)]
hostfile "myhost.txt"                    // 防止 Valve 每次更新时覆盖 Hostfile。[请编辑此文件而非 host.txt，位于同一目录 (/left4dead2)]

// 比赛模式加载时要加载哪些 .cfg 文件（插件，无其他内容）- 用分号分隔
sm_cvar confogl_match_execcfg_plugins "generalfixes.cfg;confogl_plugins.cfg;sharedplugins.cfg"

// [其他实用项]
// -----------------------------------------------------------------------
sv_allow_lobby_connect_only "0"          // 如果设为 1，玩家只能从匹配 lobby 加入服务器，无法直连。

// [文件一致性]
// -----------------------------------------------------------------------
sv_consistency "1"                       // 服务器是否对关键文件强制执行文件一致性检查。
sv_pure "2"                              // 服务器将强制所有客户端文件来自 Steam 以及与服务器匹配的附加文件。
sv_pure_kick_clients "1"                 // 如果设为 1，服务器将踢出文件不匹配的客户端。

// [日志]
// -----------------------------------------------------------------------
log on                                   // 创建日志文件（on | off）
sv_logecho 0                             // 默认 0；将日志信息回显到控制台。
sv_logfile 1                             // 默认 1；在日志文件中记录服务器信息。
sv_log_onefile 0                         // 默认 0；将服务器信息仅记录到单个文件。
sv_logbans 1                             // 默认 0；在服务器日志中记录封禁信息。
sv_logflush 0                            // 默认 0；每次写入时将日志文件刷新到磁盘（较慢）。
sv_logsdir logs                          // 游戏目录中存放服务器日志的文件夹。

// [插件禁用器]
// -----------------------------------------------------------------------
// 此设置将禁用/启用服务器端插件禁用器。
// -1 = 使用 addonconfig.cfg
// 0 = 禁用插件。
// 1 = 启用插件
///////////////////////////////////////////////////////////////////////
sm_cvar l4d2_addons_eclipse 0

// Tickrate 修复
sm_cvar tick_door_speed 1.3

// 槽位（防止换图时 sv_maxplayers 不断被重置）
sm_cvar mv_maxplayers 30

// 禁用 Wait 命令
sm_cvar sv_allow_wait_command 0

// [网络、速率]
// - 客户端速率强制设为 100，适用于 100 Tick。
// - 使用不同 Tickrate 时，请相应修改设置：
// 1. 将 100000 改为（Tickrate × 1000）作为速率值
// 2. 将 100 改为（Tickrate）作为 Cmd 和 Update 速率值。
// -----------------------------------------------------------------------
sm_cvar sv_maxunlag 0.35                      // 回溯客户端的最大秒数（客户端延迟 + 插值）。
sm_cvar sv_minupdaterate 100                  // 客户端 cl_updaterate 的最小值。
sm_cvar sv_maxupdaterate 100                  // 客户端 cl_updaterate 的最大值。
sm_cvar sv_mincmdrate 100                     // 客户端 cl_cmdrate 的最小值。
sm_cvar sv_maxcmdrate 100                     // 客户端 cl_cmdrate 的最大值。
sm_cvar sv_client_min_interp_ratio 0          // 客户端 cl_interp_ratio 的最小值。
sm_cvar sv_client_max_interp_ratio 0          // 客户端 cl_interp_ratio 的最大值。
sm_cvar sv_minrate 100000                      // 客户端 rate 的最小值。（硬上限为 30000）
sm_cvar sv_maxrate 100000                      // 客户端 rate 的最大值。（硬上限为 30000）
sm_cvar net_splitpacket_maxrate 100000        // 当数据包被拆分时，服务器以客户端"rate"和服务器"net_splitpacket_maxrate"中的较低值发送，匹配 rate 以防止限速。
sm_cvar net_maxcleartime 0.0001               // 根据速率设置等待下一个数据包发送的最大秒数，减少自身引入的阻塞。
sm_cvar sv_clockcorrection_msecs 20           // 强制修正超出可接受范围的客户端命令。（100 Tick 下为 2 ticks，约 40ms 窗口（约 20ms 漂移））

// 一些微调
sm_cvar sv_unlag_fixstuck 1                   // 防止在尝试"解除延迟补偿"玩家时卡住。
sm_cvar sv_forcepreload 1                     // 预加载总是件好事，牺牲一点内存。
sm_cvar fps_max 0                             // 强制服务器 CPU 可用的最大 FPS。

// 100 Tick 和强劲 CPU 的理想设置。
// 通过这些设置，我们在高负载下牺牲了 NextBot 的流畅度（可通过 cl_interp 0.010~0.020 缓解），而非牺牲命中判定等重要方面。
// 要获得最适合你配置的值，建议在 Tank + 尸潮等情况下监控服务器 fps。
// NextBot 是指普通感染者和 Witch。
sm_cvar nb_update_frequency  0.01              // 值越低，NextBot 更新越频繁（寻路和状态），非常消耗 CPU。（默认：0.100）
sm_cvar nb_update_maxslide   1                 // NextBot 在强制更新前可被推迟的最大 tick 数（默认：2）
sm_cvar nb_update_framelimit 5                 // 每帧 NextBot 的 CPU 预算（默认：15）

// 查询
sm_cvar sv_max_queries_sec_global 20
sm_cvar sv_max_queries_sec 3
sm_cvar sv_max_queries_window 10
