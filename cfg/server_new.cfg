// ===========================================================================
// L4D2 Server Configuration
// 可轻松与普通对抗和竞技对抗服务器协同工作.
// 几乎不需要任何知识, 所有内容都有解释.
// Translated and annotated by apples1949 for personal use.
// ===========================================================================

// [General / 一般设置]
// -----------------------------------------------------------------------
//hostname "My Cool Server"
//  服务器名称. 无法直接设置中文, 中文需要插件支持.
//  本插件包已包含该插件 -- 修改以下文件:
//  addons/sourcemod/configs/hostname/l4d2_hostname.txt
//  并保存为 UTF-8 without BOM 格式.

//rcon_password "WowYouKnowThePasswordHere"
//  RCON 密码. 建议服务器开放 TCP 且在启动项加上 "+ip 0.0.0.0",
//  配合 GSCP (https://apkpure.com/cn/game-server-control-panel/ru.air.gscp)
//  或其他 RCON 客户端软件使用.

//sv_steamgroup "13333337"
//  绑定 Steam 组 ID.

//sv_search_key "CompetitiveRework"
//  服务器搜索标签, 用于服务器浏览器筛选.

//sv_steamgroup_exclusive "0"
//  控制哪些玩家可以通过匹配加入服务器:
//  0 = 公共游戏 (默认)
//  1 = 仅限组内成员
//  2 = 仅限好友

motdfile "mymotd.txt"
//  指定自定义 MOTD 文件名, 防止游戏更新覆盖默认 motd 文件.
//  该文件位于游戏目录 left4dead2 下.

hostfile "myhost.txt"
//  指定自定义 host 文件名, 防止游戏更新覆盖默认 host 文件.
//  该文件位于游戏目录 left4dead2 下.

//  加载不同配置时都会执行这些 cfg 文件; 一般不需要修改.
sm_cvar confogl_match_execcfg_plugins "generalfixes.cfg;confogl_plugins.cfg;sharedplugins.cfg"

// [Matchmaking / 匹配设置]
// -----------------------------------------------------------------------
//sv_allow_lobby_connect_only "0"
//  控制基于大厅的匹配:
//  0 = 关闭匹配 (禁止大厅连接)
//  1 = 开启匹配 (允许大厅连接)
//  注意: 本插件包使用了 lakwsh 的多人破解 (github.com/lakshw/l4dtoolz),
//  设置 0 同时也会禁止创建大厅. 若想默认开启匹配, 请注释或删除此参数.

//sm_cvar sv_force_unreserved "1"
//  强制移除大厅预约系统, 允许玩家直接加入.

// [File Consistency / 文件一致性]
// -----------------------------------------------------------------------
sv_consistency "0"
//  服务器模型及杂项文件一致性检查:
//  0 = 关闭 (模组服务器推荐)
//  1 = 开启 (默认)

sv_pure "1"
//  控制客户端允许使用何种自定义文件:
//  1 = 允许玩家修改任何游戏文件.
//  2 = 基于白名单限制玩家可修改的游戏文件.
//  3 = 强制客户端忽略自定义内容, 仅使用 Steam 提供的原始游戏文件.
//  注: CS:GO/CSS 默认为 2; L4D2 中此参数基本无效.

sv_pure_kick_clients "0"
//  若设为 1, 当玩家 mod 文件与服务器不一致时将被踢出.

// [Logging / 日志记录]
// -----------------------------------------------------------------------
log on
//  启用/禁用服务器日志. (on | off)

sv_logecho 0
//  默认: 0. 向服务器控制台回传日志信息.

sv_logfile 1
//  默认: 1. 将服务器信息记录到磁盘上的日志文件中.

sv_log_onefile 0
//  默认: 0. 若设为 1, 所有日志记录到单个文件中,
//  而非每张地图单独一个文件.

sv_logbans 1
//  默认: 0. 在服务器日志中记录封禁信息.

sv_logflush 0
//  默认: 0. 每次写入时将日志文件刷新到磁盘 (慢速).
//  仅在调试时启用.

sv_logsdir logs
//  游戏目录中存放服务器日志的文件夹名称.

// [Addon Management / Addons 启动管理]
// -----------------------------------------------------------------------
//  Left4hook 的 cvar, 用于控制是否加载 addons.
//  单独添加到不同配置文件中, 方便各模式独立控制.
//
//  -1 = 使用 addonconfig.cfg 中的设定值
//   0 = 禁用所有 addons
//   1 = 启用所有 addons
//
//sm_cvar l4d2_addons_eclipse 0

// [Tick Fixes / Tick 修复]
// -----------------------------------------------------------------------
sm_cvar tick_door_speed 1.3
//  修复高 tickrate 服务器上开门过快的问题.

// [Player Slots / 玩家槽位]
// -----------------------------------------------------------------------
sm_cvar mv_maxplayers 18
//  设置最大玩家数. 仅在开服时由插件更改一次,
//  避免每次加载新对局时重复设置.

// [Wait Command Control / Wait 指令控制]
// -----------------------------------------------------------------------
//sm_cvar sv_allow_wait_command 1
//  允许或禁止连接到本服务器的客户端使用 "wait" 指令.
//  取消注释以启用速砍功能.
//  默认: 1. 若启用此项, 请在 generalfixes.cfg 中注释掉
//  fix_fastmelee.smx 的启动.

// [Network / Rates / 网络与速率]
// -----------------------------------------------------------------------
//  客户端速率强制设为 100, 对应 100 Tick 服务器.
//  若使用不同的 Tick 率, 请相应调整以下设置:
//    1. 将速率值从 100000 改为 (Tick率 * 1000)
//    2. 将指令/更新速率值从 100 改为 (Tick率)
// -----------------------------------------------------------------------
sm_cvar sv_maxunlag 0.35
//  服务器回溯客户端的最大秒数, 用于滞后补偿
//  (包含客户端延迟 + 插值缓冲).

sm_cvar sv_minupdaterate 100
//  服务器强制的最小客户端更新速率.

sm_cvar sv_maxupdaterate 100
//  服务器强制的最小客户端更新速率.

sm_cvar sv_mincmdrate 100
//  服务器强制的最小客户端指令发送速率.

sm_cvar sv_maxcmdrate 100
//  服务器强制的最小客户端指令发送速率.

sm_cvar sv_client_min_interp_ratio 0
//  客户端允许的最小插值比例.
//  0 = 无下限, 客户端可使用 cl_interp_ratio 0.

sm_cvar sv_client_max_interp_ratio 0
//  客户端允许的最大插值比例.
//  0 = 无上限强制.

sm_cvar sv_minrate 100000
//  客户端速率最小值 (引擎内部硬上限为 30000).

sm_cvar sv_maxrate 100000
//  客户端速率最大值 (引擎内部硬上限为 30000).

sm_cvar net_splitpacket_maxrate 100000
//  数据包分裂时, 服务器将取客户端 "rate" 值与此设定值中的较低值
//  来发送数据包. 请将此值与 sv_minrate/sv_maxrate 保持同步,
//  以避免带宽被意外限速.

sm_cvar net_maxcleartime 0.0001
//  基于速率设置, 等待发送下一个数据包的最大秒数.
//  较低的值可减少自身引起的网络阻塞.

sm_cvar sv_clockcorrection_msecs 20
//  当客户端指令 tick 漂移超出可接受范围时, 强制将其校正回正常范围.
//  在 100 Tick 环境下, 约对应 40 ms 窗口 (~2 ticks),
//  约 20 ms 校正偏移量.

//sm_cvar sv_client_predict 1
//  强制连接客户端使用指定的 cl_predict 值.
//  -1 = 让客户端自行设置 cl_predict (默认行为).

//sm_cvar sv_client_cmdrate_difference 0
//  允许服务器 cmdrate (sv_maxcmdrate) 与客户端 cmdrate
//  (cl_cmdrate) 之间的最大差值. 0 = 强制完全一致.

// [Misc Tweaks / 微调项]
// -----------------------------------------------------------------------
sm_cvar sv_unlag_fixstuck 1
//  防止服务器在尝试对玩家进行 "取消延迟" (un-lag) 处理时
//  导致玩家卡住.

sm_cvar sv_forcepreload 1
//  预加载总是有益的 -- 用少量内存换取更流畅的性能,
//  减少游戏中途的卡顿.

sm_cvar fps_max 0
//  限制服务器 CPU 可使用的最大帧率 (FPS) 上限.
//  0 = 不限制 (充分利用 CPU 性能).

//sm_cvar mp_autoteambalance 1
//  是否启用自动团队平衡.

//sm_cvar z_brawl_chance 2
//  控制普通感染者之间随机打架的概率.
//  较低的值可减少感染者之间无意义的互殴.

// [NextBot Settings / NextBot 设置 -- 100 Tick + 强劲 CPU 理想值]
// -----------------------------------------------------------------------
//  采用这些设置时, 我们牺牲的是高负载下 NextBot 的流畅性
//  (可通过客户端设置 cl_interp 0.010~0.020 部分缓解),
//  而非牺牲命中判定等其他重要功能.
//
//  若需针对您的硬件配置定制最优参数, 建议在 Tank + 尸潮
//  同时出现的场景下监控服务器帧率.
//
//  "NextBot" 指代普通感染者 (Common Infected) 与女巫 (Witch).
// -----------------------------------------------------------------------
sm_cvar nb_update_frequency 0.01
//  NextBot 更新 (路径与状态) 的频率.
//  数值越低, 更新越频繁, 对 CPU 消耗极大. (默认: 0.100)

sm_cvar nb_update_maxslide 1
//  NextBot 可被延迟更新的最大 tick 数,
//  超过此数值将被强制更新. (默认: 2)

sm_cvar nb_update_framelimit 5
//  每帧分配给 NextBot 更新的 CPU 计算预算. (默认: 15)

// [Query Settings / 查询设置]
// -----------------------------------------------------------------------
sm_cvar sv_max_queries_sec_global 20
//  服务器每秒响应来自所有来源的最大查询次数.

sm_cvar sv_max_queries_sec 3
//  服务器每秒响应来自单个 IP 地址的最大查询次数.

sm_cvar sv_max_queries_window 10
//  平均每秒查询次数的统计时间窗口 (单位: 秒).

//sm_cvar sv_player_stuck_tolerance 5
//  服务器检测玩家卡住的容差值.

//sm_cvar sv_stats 0
//  收集服务器 CPU 使用情况统计信息. [默认: 1]

// [RCON Anti-Flood / Security / RCON 防刷与安全]
// -----------------------------------------------------------------------
//  如果服务器网络不佳, 导致验证正版玩家 SteamID 失败,
//  则会直接 ban 掉验证失败玩家的 IP.
//  以下设置可以在启用 RCON 的情况下放宽验证限制.
//  若不需要 RCON 验证, 直接禁用 TCP 即可.
// -----------------------------------------------------------------------
//sm_cvar sv_rcon_banpenalty 1
//  RCON 验证失败达到次数上限后的封禁时长 (单位: 分钟).
//  0 = 永久封禁 (默认).

//sm_cvar sv_rcon_log 1
//  是否记录 RCON 指令使用记录.

//sm_cvar sv_rcon_maxfailures 9999
//  在限定时间内最多允许的 RCON 验证失败次数,
//  超过则触发封禁.

//sm_cvar sv_rcon_minfailures 9999
//  触发封禁之前至少需要的 RCON 验证失败次数.

//sm_cvar sv_rcon_minfailuretime 9999
//  统计 RCON 验证失败次数的时间窗口 (单位: 秒).

// [Ban Lists / 封禁列表]
// -----------------------------------------------------------------------
//  服务器启动时加载封禁配置文件.
exec banned_user.cfg
exec banned_ip.cfg

// [Default Game Mode / 默认游戏模式]
// -----------------------------------------------------------------------
//  服务器默认启动的配置. 可自行修改.
//  若不设置, 玩家进服后需要手动选择配置.
sm_fm applemod
